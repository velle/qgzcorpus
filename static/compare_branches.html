<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QGIS Corpus — Compare branches</title>
  <style>
    * { box-sizing: border-box; }
    :root { --header-h: 34px; }
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f9f9f9; }

    #site-header {
      height: var(--header-h);
      background: #1e1e2e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #0d0d1a;
    }
    #site-header a {
      color: #999;
      font-family: monospace;
      font-size: 0.82rem;
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    #site-header a:hover { color: #fff; }

    #content { padding: 12px 16px 0; }
    h1 { font-size: 1.1rem; margin: 0 0 10px; color: #222; }
    #loading { color: #888; font-size: 0.85rem; }

    table {
      border-collapse: collapse;
      font-size: 0.78rem;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 3px 8px;
      white-space: nowrap;
    }
    th {
      background: #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    td:first-child, th:first-child {
      position: sticky;
      left: 0;
      background: #fafafa;
      z-index: 1;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th:first-child { z-index: 3; background: #f0f0f0; }

    td.hash { text-align: center; font-family: monospace; }
    td.empty { background: #f8f8f8; }

    #wrap { overflow: auto; max-height: calc(100vh - var(--header-h) - 64px); }
  </style>
</head>
<body>
  <header id="site-header">
    <a href="index.html">qgzcorpus</a>
  </header>
  <div id="content">
    <h1>Compare branches</h1>
    <p id="loading">Loading…</p>
    <div id="wrap"></div>
  </div>

  <script>
    const BRANCHES = [
      'release-3_0', 'release-3_4', 'release-3_10', 'release-3_16',
      'release-3_22', 'release-3_28', 'release-3_34', 'master',
    ];

    const sql = `
      SELECT
        substr(f.rel_path, length('qgis_branches/') + length(f.branch) + 2) AS path,
        f.branch,
        f.id AS file_id,
        q.digest
      FROM files f
      JOIN qgs q ON q.file_id = f.id
      WHERE f.branch IS NOT NULL
      ORDER BY path, f.branch
    `;

    fetch(`/corpus.json?sql=${encodeURIComponent(sql)}&_shape=array&_size=max`)
      .then(r => r.json())
      .then(rows => {
        const map = new Map();
        for (const row of rows) {
          if (!map.has(row.path)) map.set(row.path, {});
          map.get(row.path)[row.branch] = { digest: row.digest, file_id: row.file_id };
        }

        const paths = [...map.keys()].sort();
        const table = document.createElement('table');

        const thead = table.createTHead();
        const hr = thead.insertRow();
        const th0 = document.createElement('th');
        th0.textContent = 'File';
        hr.appendChild(th0);
        for (const b of BRANCHES) {
          const th = document.createElement('th');
          th.textContent = b;
          hr.appendChild(th);
        }

        const tbody = table.createTBody();
        for (const path of paths) {
          const byBranch = map.get(path);
          const tr = tbody.insertRow();

          const td0 = tr.insertCell();
          td0.textContent = path;
          td0.title = path;

          let prevDigest = null;

          for (const b of BRANCHES) {
            const td = tr.insertCell();
            const entry = byBranch[b];

            if (entry?.digest) {
              td.className = 'hash';
              const changed = prevDigest !== null && entry.digest !== prevDigest;
              const a = document.createElement('a');
              a.href = `qgs.html?id=${entry.file_id}`;
              a.textContent = entry.digest.slice(0, 4);
              if (changed) td.style.background = '#fdd';
              td.appendChild(a);
              prevDigest = entry.digest;
            } else {
              td.className = 'empty';
            }
          }
        }

        document.getElementById('loading').remove();
        document.getElementById('wrap').appendChild(table);
      });
  </script>
</body>
</html>
