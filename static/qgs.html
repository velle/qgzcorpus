<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QGIS Corpus — File</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f9f9f9; }

    #top { padding: 12px 16px 8px; }
    a { color: #555; font-size: 0.85rem; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.2rem; margin: 6px 0 4px; }
    #meta { font-size: 0.85rem; color: #555; margin-bottom: 8px; }
    #meta span { margin-right: 16px; }
    #error { color: red; padding: 16px; }

    .xml-entry { margin-bottom: 24px; }
    .xml-entry h2 { font-size: 0.85rem; color: #555; margin: 0 0 4px 0; }

    .editor-toolbar { padding: 4px 0 4px 0; display: flex; gap: 8px; }
    .editor-toolbar button {
      font-size: 0.75rem; padding: 2px 8px; cursor: pointer;
      border: 1px solid #ccc; background: #f0f0f0; border-radius: 3px;
    }
    .editor-toolbar button:hover { background: #e0e0e0; }

    .editor-layout { display: flex; gap: 0; }

    #nav {
      width: 180px;
      flex-shrink: 0;
      background: #f0f0f0;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      height: 80vh;
      padding: 4px 0;
    }
    #nav a {
      display: block;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      text-decoration: none;
    }
    #nav a:hover { background: #ddd; }
    #nav a.active { background: #c8daf5; font-weight: bold; }

    .editor-wrap { flex: 1; height: 80vh; }
  </style>
</head>
<body>
  <div id="top">
    <a href="qgslist.html">← Back to list</a>
    <h1 id="title">Loading…</h1>
    <div id="meta"></div>
  </div>
  <div id="entries"></div>
  <div id="error"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

    function buildCharToLine(text) {
      const map = new Uint32Array(text.length + 1);
      let line = 0;
      for (let i = 0; i < text.length; i++) {
        map[i] = line;
        if (text[i] === '\n') line++;
      }
      map[text.length] = line;
      return map;
    }

    function xmlFoldingRanges(text) {
      const charToLine = buildCharToLine(text);
      const ranges = [];
      const stack = [];
      const re = /(<!\[CDATA\[)|(\]\]>)|<(\/?)([A-Za-z_][\w:.-]*)(?:[^>"']*|"[^"]*"|'[^']*')*(\/?)>/g;
      let cdataStart = -1;
      let match;
      while ((match = re.exec(text)) !== null) {
        if (match[1]) {
          cdataStart = charToLine[match.index];
        } else if (match[2]) {
          const cdataEnd = charToLine[match.index];
          if (cdataStart >= 0 && cdataEnd > cdataStart)
            ranges.push({ start: cdataStart + 1, end: cdataEnd + 1,
              kind: monaco.languages.FoldingRangeKind.Region });
          cdataStart = -1;
        } else if (cdataStart >= 0) {
          // inside CDATA
        } else {
          const isClosing = match[3] === '/';
          const isSelfClosing = !isClosing && match[0].endsWith('/>');
          const tagName = match[4];
          const line = charToLine[match.index];
          if (!isClosing && !isSelfClosing) {
            stack.push({ tagName, startLine: line });
          } else if (isClosing) {
            for (let i = stack.length - 1; i >= 0; i--) {
              if (stack[i].tagName === tagName) {
                const startLine = stack[i].startLine;
                if (line > startLine)
                  ranges.push({ start: startLine + 1, end: line + 1,
                    kind: monaco.languages.FoldingRangeKind.Region });
                stack.splice(i, 1);
                break;
              }
            }
          }
        }
      }
      return ranges;
    }

    // Return direct children of the root element with their line numbers
    function getRootChildren(text) {
      const charToLine = buildCharToLine(text);
      const children = [];
      let depth = 0;
      const re = /(<!\[CDATA\[[\s\S]*?\]\]>)|<(\/?)([A-Za-z_][\w:.-]*)(?:[^>"']*|"[^"]*"|'[^']*')*(\/?)>/g;
      let match;
      while ((match = re.exec(text)) !== null) {
        if (match[1]) continue; // skip CDATA
        const isClosing = match[2] === '/';
        const isSelfClosing = !isClosing && match[0].endsWith('/>');
        const tagName = match[3];
        const line = charToLine[match.index];
        if (!isClosing) {
          depth++;
          if (depth === 2)
            children.push({ tagName, line });
          if (isSelfClosing) depth--;
        } else {
          depth--;
        }
      }
      return children;
    }

    function compressCdata(xml) {
      return xml.replace(/<!\[CDATA\[([\s\S]*?)]]>/g, (_match, content) => {
        const trimmed = content.trim();
        if (!trimmed.includes('\n')) return `<![CDATA[${trimmed}]]>`;
        const preview = trimmed.split('\n')[0].trim().slice(0, 80);
        return `<![CDATA[${preview}…]]>`;
      });
    }

    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('error').textContent = 'No id parameter in URL.';
    } else {
      Promise.all([
        fetch(`/corpus/files.json?_shape=array&id=${id}`).then(r => r.json()),
        fetch(`/corpus/qgs.json?_shape=array&file_id=${id}&_size=max`).then(r => r.json()),
        new Promise(resolve => require(['vs/editor/editor.main'], resolve)),
      ]).then(([files, qgsRows]) => {
        if (!files.length) {
          document.getElementById('error').textContent = `No file found with id=${id}.`;
          return;
        }

        monaco.languages.registerFoldingRangeProvider('xml', {
          provideFoldingRanges(model) {
            return xmlFoldingRanges(model.getValue());
          }
        });

        const file = files[0];
        document.title = `QGIS Corpus — ${file.filename}`;
        document.getElementById('title').textContent = file.filename;
        document.getElementById('meta').innerHTML =
          `<span>${file.rel_path}</span>` +
          `<span>${file.extension.toUpperCase()}</span>` +
          `<span>${(file.size_bytes / 1024).toFixed(1)} KB</span>` +
          (file.branch ? `<span>Branch: ${file.branch}</span>` : '');

        const container = document.getElementById('entries');
        if (!qgsRows.length) {
          container.textContent = 'No QGS data found.';
          return;
        }

        for (const q of qgsRows) {
          const entry = document.createElement('div');
          entry.className = 'xml-entry';

          if (q.inner_filename) {
            const h2 = document.createElement('h2');
            h2.textContent = q.inner_filename;
            entry.appendChild(h2);
          }

          const toolbar = document.createElement('div');
          toolbar.className = 'editor-toolbar';

          const layout = document.createElement('div');
          layout.className = 'editor-layout';

          const nav = document.createElement('div');
          nav.id = 'nav';

          const wrap = document.createElement('div');
          wrap.className = 'editor-wrap';

          layout.appendChild(nav);
          layout.appendChild(wrap);
          entry.appendChild(toolbar);
          entry.appendChild(layout);
          container.appendChild(entry);

          const xml = compressCdata(q.xml);
          const editor = monaco.editor.create(wrap, {
            value: xml,
            language: 'xml',
            readOnly: true,
            theme: 'vs',
            minimap: { enabled: true },
            wordWrap: 'off',
            scrollBeyondLastLine: false,
            stickyScroll: { enabled: true },
          });

          // Build nav links from root children
          const rootChildren = getRootChildren(xml);
          const navLinks = [];
          for (const child of rootChildren) {
            const a = document.createElement('a');
            a.textContent = `<${child.tagName}>`;
            a.title = `Line ${child.line + 1}`;
            a.addEventListener('click', () => {
              editor.revealLineInCenter(child.line + 1);
              editor.setPosition({ lineNumber: child.line + 1, column: 1 });
              editor.focus();
              navLinks.forEach(l => l.classList.remove('active'));
              a.classList.add('active');
            });
            navLinks.push(a);
            nav.appendChild(a);
          }

          // Highlight active nav item on scroll
          editor.onDidScrollChange(() => {
            const visibleLine = editor.getVisibleRanges()[0]?.startLineNumber ?? 1;
            let active = null;
            for (const child of rootChildren) {
              if (child.line + 1 <= visibleLine) active = child;
              else break;
            }
            navLinks.forEach((l, i) => {
              l.classList.toggle('active', rootChildren[i] === active);
            });
          });

          const toggleBtn = document.createElement('button');
          toggleBtn.textContent = 'Nav ▾';
          toggleBtn.addEventListener('click', () => {
            const hidden = nav.style.display === 'none';
            nav.style.display = hidden ? '' : 'none';
            toggleBtn.textContent = hidden ? 'Nav ▾' : 'Nav ▸';
            editor.layout();
          });
          toolbar.appendChild(toggleBtn);

          [['Collapse all', () => editor.getAction('editor.foldAll').run()],
           ['Expand all',   () => editor.getAction('editor.unfoldAll').run()]
          ].forEach(([label, fn]) => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.addEventListener('click', fn);
            toolbar.appendChild(btn);
          });
        }
      });
    }
  </script>
</body>
</html>
