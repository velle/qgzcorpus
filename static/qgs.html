<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QGIS Corpus — File</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 16px; background: #f9f9f9; }
    a { color: #555; font-size: 0.85rem; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.2rem; margin: 8px 0 4px; }
    #meta { font-size: 0.85rem; color: #555; margin-bottom: 16px; }
    #meta span { margin-right: 16px; }
    .xml-entry { margin-bottom: 16px; }
    .xml-entry h2 { font-size: 0.9rem; margin: 0 0 4px; color: #333; }
    pre {
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 10px;
      overflow: auto;
      max-height: 80vh;
      font-size: 0.75rem;
      margin: 0;
      white-space: pre;
    }
    #error { color: red; }
  </style>
</head>
<body>
  <a href="qgslist.html">← Back to list</a>
  <h1 id="title">Loading…</h1>
  <div id="meta"></div>
  <div id="entries"></div>
  <div id="error"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('error').textContent = 'No id parameter in URL.';
    } else {
      Promise.all([
        fetch(`/corpus/files.json?_shape=array&id=${id}`).then(r => r.json()),
        fetch(`/corpus/qgs.json?_shape=array&file_id=${id}&_size=max`).then(r => r.json()),
      ]).then(([files, qgsRows]) => {
        if (!files.length) {
          document.getElementById('error').textContent = `No file found with id=${id}.`;
          return;
        }

        const file = files[0];
        document.title = `QGIS Corpus — ${file.filename}`;
        document.getElementById('title').textContent = file.filename;
        document.getElementById('meta').innerHTML =
          `<span>${file.rel_path}</span>` +
          `<span>${file.extension.toUpperCase()}</span>` +
          `<span>${(file.size_bytes / 1024).toFixed(1)} KB</span>` +
          (file.branch ? `<span>Branch: ${file.branch}</span>` : '');

        const container = document.getElementById('entries');
        if (!qgsRows.length) {
          container.textContent = 'No QGS data found.';
          return;
        }
        for (const q of qgsRows) {
          const div = document.createElement('div');
          div.className = 'xml-entry';
          if (q.inner_filename) {
            const h2 = document.createElement('h2');
            h2.textContent = q.inner_filename;
            div.appendChild(h2);
          }
          const pre = document.createElement('pre');
          pre.textContent = q.xml;
          div.appendChild(pre);
          container.appendChild(div);
        }
      });
    }
  </script>
</body>
</html>
