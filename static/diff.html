<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QGIS Corpus — Diff</title>
  <style>
    * { box-sizing: border-box; }
    :root { --header-h: 34px; }
    html, body { margin: 0; padding: 0; font-family: sans-serif; background: #f9f9f9; }

    #site-header {
      height: var(--header-h);
      background: #1e1e2e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #0d0d1a;
    }
    #site-header a {
      color: #999;
      font-family: monospace;
      font-size: 0.82rem;
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    #site-header a:hover { color: #fff; }

    #top { padding: 10px 16px 6px; }
    #top a { color: #555; font-size: 0.85rem; text-decoration: none; }
    #top a:hover { text-decoration: underline; }
    h1 { font-size: 1.1rem; margin: 4px 0 3px; }
    #labels {
      display: flex;
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 4px;
      gap: 0;
    }
    #labels span { flex: 1; padding: 3px 8px; background: #f0f0f0; border: 1px solid #ddd; }
    #labels span + span { border-left: none; }
    #error { color: red; padding: 16px; }
    #diff-container { height: calc(100vh - var(--header-h) - 96px); }
  </style>
</head>
<body>
  <header id="site-header">
    <a href="index.html">qgzcorpus</a>
  </header>
  <div id="top">
    <a href="compare_branches.html">← Back to compare</a>
    <h1>Diff</h1>
    <div id="labels">
      <span id="label-a">…</span>
      <span id="label-b">…</span>
    </div>
  </div>
  <div id="error"></div>
  <div id="diff-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

    const params = new URLSearchParams(location.search);
    const idA = params.get('a');
    const idB = params.get('b');

    if (!idA || !idB) {
      document.getElementById('error').textContent = 'Missing a= or b= parameters.';
    } else {
      Promise.all([
        fetch(`/corpus/qgs.json?_shape=array&id=${idA}`).then(r => r.json()),
        fetch(`/corpus/qgs.json?_shape=array&id=${idB}`).then(r => r.json()),
        new Promise(resolve => require(['vs/editor/editor.main'], resolve)),
      ]).then(([rowsA, rowsB]) => {
        if (!rowsA.length || !rowsB.length) {
          document.getElementById('error').textContent = 'Could not load one or both files.';
          return;
        }

        const qA = rowsA[0];
        const qB = rowsB[0];

        if (!qA.cleaned_xml || !qB.cleaned_xml) {
          document.getElementById('error').textContent = 'cleaned_xml missing for one or both files.';
          return;
        }

        return Promise.all([
          fetch(`/corpus/files.json?_shape=array&id=${qA.file_id}`).then(r => r.json()),
          fetch(`/corpus/files.json?_shape=array&id=${qB.file_id}`).then(r => r.json()),
        ]).then(([filesA, filesB]) => {
          const labelA = filesA[0] ? `${filesA[0].branch}  —  ${filesA[0].filename}` : `id ${idA}`;
          const labelB = filesB[0] ? `${filesB[0].branch}  —  ${filesB[0].filename}` : `id ${idB}`;
          document.getElementById('label-a').textContent = labelA;
          document.getElementById('label-b').textContent = labelB;
          document.title = `Diff — ${labelA} vs ${labelB}`;

          const container = document.getElementById('diff-container');
          const diffEditor = monaco.editor.createDiffEditor(container, {
            readOnly: true,
            theme: 'vs',
            minimap: { enabled: true },
            wordWrap: 'off',
            scrollBeyondLastLine: false,
            renderSideBySide: true,
            originalEditable: false,
          });

          diffEditor.setModel({
            original: monaco.editor.createModel(qA.cleaned_xml, 'xml'),
            modified: monaco.editor.createModel(qB.cleaned_xml, 'xml'),
          });
        });
      });
    }
  </script>
</body>
</html>
