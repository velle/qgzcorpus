<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QGIS Corpus</title>
  <style>
    * { box-sizing: border-box; }
    :root { --header-h: 34px; }
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f9f9f9; }

    #site-header {
      height: var(--header-h);
      background: #1e1e2e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #0d0d1a;
    }
    #site-header a {
      color: #999;
      font-family: monospace;
      font-size: 0.82rem;
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    #site-header a:hover { color: #fff; }

    #content { padding: 40px 48px; }
    h1 { font-size: 1.4rem; margin: 0 0 24px; color: #111; font-weight: 600; }

    table { border-collapse: collapse; min-width: 420px; border: 1px solid black; }
    tr:hover { background: #eef2ff; }
    td { padding: 10px 16px; vertical-align: middle; border: 1px solid black; }
    th { padding: 8px 16px; text-align: left; background: #f0f0f0; font-size: 0.85rem; border: 1px solid black; }
    td.url { font-family: monospace; font-size: 0.82rem; color: #555; white-space: nowrap; }
    td.link { width: 160px; }
    td.link a { font-size: 1rem; color: #1a3a6b; text-decoration: none; font-weight: 600; }
    td.link a:hover { text-decoration: underline; }
    td.desc { font-size: 0.88rem; color: #444; }
  </style>
</head>
<body>
  <header id="site-header">
    <a href="index.html">qgzcorpus</a>
  </header>
  <div id="content">
    <h1>QGIS Corpus</h1>
    <table>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>URL</th>
      </tr>
      <tr>
        <td class="link"><a href="qgslist.html">QGS files</a></td>
        <td class="desc">Browse all .qgs and .qgz files</td>
        <td class="url">static/qgslist.html</td>
      </tr>
      <tr>
        <td class="link"><a href="compare_branches.html">Compare branches</a></td>
        <td class="desc">Matrix view — one row per file, one column per branch</td>
        <td class="url">static/compare_branches.html</td>
      </tr>
    </table>
  </div>
</body>
</html>
